services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-abyssal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-abyssal}
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  identity-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: identity-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/abyssal_identity
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-abyssal}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-abyssal}
      APP_SECURITY_JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-please-32-characters-minimum}
      APP_SECURITY_ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      APP_SECURITY_REQUIRE_HTTPS_IN_PRODUCTION: ${REQUIRE_HTTPS_IN_PRODUCTION:-true}
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-true}
      APP_SEED_ADMIN_NAME: ${APP_SEED_ADMIN_NAME:-Abyssal Admin}
      APP_SEED_ADMIN_EMAIL: ${APP_SEED_ADMIN_EMAIL:-admin@abyssal.local}
      APP_SEED_ADMIN_PASSWORD: ${APP_SEED_ADMIN_PASSWORD:-Admin123!}

  catalog-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: catalog-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/abyssal_catalog
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-abyssal}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-abyssal}
      APP_SECURITY_JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-please-32-characters-minimum}
      APP_SECURITY_ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      APP_SECURITY_REQUIRE_HTTPS_IN_PRODUCTION: ${REQUIRE_HTTPS_IN_PRODUCTION:-true}
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-true}

  operations-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: operations-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      catalog-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/abyssal_operations
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-abyssal}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-abyssal}
      APP_SECURITY_JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-please-32-characters-minimum}
      APP_SECURITY_ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      APP_SECURITY_REQUIRE_HTTPS_IN_PRODUCTION: ${REQUIRE_HTTPS_IN_PRODUCTION:-true}
      APP_CATALOG_BASE_URL: http://catalog-service:8080

  nginx:
    build:
      context: ./nginx
    restart: unless-stopped
    depends_on:
      - identity-service
      - catalog-service
      - operations-service
    environment:
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-*}
    ports:
      - "${NGINX_PORT:-3333}:443"

volumes:
  postgres_data:
