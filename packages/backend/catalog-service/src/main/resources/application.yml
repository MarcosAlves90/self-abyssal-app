server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: catalog-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/abyssal_catalog}
    username: ${SPRING_DATASOURCE_USERNAME:abyssal}
    password: ${SPRING_DATASOURCE_PASSWORD:abyssal}
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
springdoc:
  paths-to-match: /api/**
  swagger-ui:
    disable-swagger-default-url: true

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  security:
    jwt-secret: ${APP_SECURITY_JWT_SECRET:dev-only-change-me-please-32-characters-minimum}
    encryption-key: ${APP_SECURITY_ENCRYPTION_KEY:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    require-https-in-production: ${APP_SECURITY_REQUIRE_HTTPS_IN_PRODUCTION:false}
  seed:
    enabled: ${APP_SEED_ENABLED:true}
